  <!-- Critical CSS for Initial Render -->
  <style>
    /* CSS Reset & Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #111827;
      background: #ffffff;
      overflow-x: hidden;
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Initial Loading Screen */
    .app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 999999;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .app-loader__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .app-loader__logo {
      width: 120px;
      height: 120px;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    .app-loader__spinner {
      width: 64px;
      height: 64px;
      border: 6px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .app-loader__text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      letter-spacing: -0.025em;
    }

    .app-loader__subtitle {
      font-size: 0.938rem;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      margin-top: -1rem;
    }

    .app-loader__progress {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 1rem;
    }

    .app-loader__progress-bar {
      height: 100%;
      background: #ffffff;
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 0%; transform: translateX(0); }
      50% { width: 100%; transform: translateX(0); }
      100% { width: 100%; transform: translateX(100%); }
    }

    /* No Script Warning */
    .noscript-alert {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      text-align: center;
      z-index: 1000000;
    }

    .noscript-alert__icon {
      width: 100px;
      height: 100px;
      margin-bottom: 2rem;
    }

    .noscript-alert__title {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 1rem;
      letter-spacing: -0.025em;
    }

    .noscript-alert__message {
      font-size: 1.25rem;
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 2rem;
      opacity: 0.95;
    }

    .noscript-alert__instructions {
      text-align: left;
      max-width: 500px;
      background: rgba(0, 0, 0, 0.2);
      padding: 1.5rem;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .noscript-alert__instructions h3 {
      font-size: 1.125rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .noscript-alert__instructions ol {
      padding-left: 1.5rem;
      font-size: 1rem;
      line-height: 1.8;
    }

    .noscript-alert__instructions li {
      margin-bottom: 0.5rem;
    }

    /* Hide loader when ready */
    .app-ready .app-loader {
      animation: fadeOut 0.3s ease forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; visibility: hidden; }
    }

    /* Reduced Motion Support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    /* Print Styles */
    @media print {
      body { background: white; }
      .app-loader, .noscript-alert { display: none !important; }
    }
  </style>

  <!-- Pre-initialization Scripts -->
  <script>
    // Environment detection
    window.__ENV__ = {
      isDev: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1',
      isProd: window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1'
    };

    // Browser compatibility check
    (function checkBrowserCompatibility() {
      const features = {
        promises: typeof Promise !== 'undefined',
        fetch: typeof fetch !== 'undefined',
        weakMap: typeof WeakMap !== 'undefined',
        localStorage: (function() {
          try {
            localStorage.setItem('__test__', '1');
            localStorage.removeItem('__test__');
            return true;
          } catch (e) {
            return false;
          }
        })(),
        es6: (function() {
          try {
            eval('const test = () => {};');
            return true;
          } catch (e) {
            return false;
          }
        })()
      };

      const unsupported = Object.keys(features).filter(key => !features[key]);

      if (unsupported.length > 0) {
        document.body.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;text-align:center;font-family:system-ui,sans-serif;"><h1 style="font-size:2rem;font-weight:900;margin-bottom:1rem;">Browser Not Supported</h1><p style="font-size:1.125rem;max-width:600px;margin-bottom:2rem;">Your browser is missing: ' + unsupported.join(', ') + '</p><p style="font-size:0.938rem;opacity:0.9;">Please upgrade to Chrome 90+, Firefox 88+, Safari 14+, or Edge 90+</p></div>';
        return false;
      }
      return true;
    })();

    // Performance monitoring
    if (window.performance && window.performance.timing) {
      window.addEventListener('load', function() {
        setTimeout(function() {
          const timing = window.performance.timing;
          const loadTime = timing.loadEventEnd - timing.navigationStart;
          const domReady = timing.domContentLoadedEventEnd - timing.navigationStart;
          
          if (window.__ENV__.isDev) {
            console.log('%c⚡ Performance Metrics', 'font-weight:bold;font-size:14px;color:#667eea');
            console.log('Load Time:', loadTime + 'ms');
            console.log('DOM Ready:', domReady + 'ms');
          }
        }, 0);
      });
    }

    // Remove loader when app is mounted
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.body.classList.add('app-ready');
        setTimeout(function() {
          const loader = document.getElementById('app-loader');
          if (loader) loader.remove();
        }, 300);
      }, 500);
    });

    // Global error handler
    window.addEventListener('error', function(event) {
      console.error('Global Error:', event.error);
    });

    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled Promise:', event.reason);
    });
  </script>

  <!-- Vite Module Entry Point -->
  <script type="module" src="/src/main.jsx"></script>
