# A generic, single database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .
version_locations = %(here)s/bar %(here)s/baz
version_path_separator = os

[post_write_hooks]
hooks = subprocess
subprocess.exit_on_error = true

[subprocess]
popenargs.create = True

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
